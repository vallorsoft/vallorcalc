# fly.toml - VállorCalc Fly.io konfiguráció
app = "vallorcalc"
primary_region = "fra"

[build]

[env]
  NODE_ENV = "production"
  PORT = "8080"
  NEXTAUTH_URL = "https://vallorcalc.fly.dev"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
