# fly.toml app configuration file generated for vallorcalc on 2026-07-12T17:57:59Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'vallorcalc'
primary_region = 'fra'

[build]

[env]
  NEXTAUTH_URL = 'https://vallorcalc.fly.dev'
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = 'connections'
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
